<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1500" viewBox="0 0 2400 1500" fill="none">
  <defs>
    <filter id="paper" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="8"/>
      <feColorMatrix type="saturate" values="0.3"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.08"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="2400" height="1500" fill="#17120D"/>
  <rect x="220" y="180" width="1960" height="1080" fill="#e9dcc0" stroke="#cdb58b" stroke-width="4"/>
  <rect x="220" y="180" width="1960" height="1080" filter="url(#paper)" opacity="0.55"/>
  <text x="1200" y="192" text-anchor="middle" fill="#8f7750" font-family="IM Fell English, serif" font-size="70">❧</text>
  <text x="380" y="392" fill="#8b2515" font-family="Cinzel, serif" font-size="40" font-weight="700" letter-spacing="18">KEY PRINCIPLE</text>
  <text x="380" y="590" fill="#1a120a" font-family="Crimson Text, serif" font-size="86">The canon was never a discovery.</text>
  <text x="380" y="700" fill="#1a120a" font-family="Crimson Text, serif" font-size="86">It was a decision.</text>
  <text x="380" y="924" fill="#5b3f18" font-family="Crimson Text, serif" font-size="58">Reconstructed from the site's parchment callout panel system.</text>
</svg>
